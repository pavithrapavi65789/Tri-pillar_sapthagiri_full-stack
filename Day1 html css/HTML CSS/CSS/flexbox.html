<!DOCTYPE html>
<html>
    <head>
        <title>flex box example</title>
    </head>
    <style>
        .container{
            display: flex;
            background-color: chocolate;
        }
        .container div{
            background-color: aqua;
            margin: 10px;
            padding: 20px;
            font-size: 20px;
        }
    </style>
    <body>
        <div class ="container">
            <div>Item 1</div>
            <div>Item 2</div>
            <div>Item 3</div>
            <div>Item 4</div>
        </div>
    </body>
</html>
